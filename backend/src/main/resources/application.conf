ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.adwatch.backend.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/adwatch"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "adwatch"
    user = ${?DATABASE_USER}
    password = "adwatch"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

firebase {
    credentialsPath = "firebase-credentials.json"
    credentialsPath = ${?FIREBASE_CREDENTIALS_PATH}
}

paypal {
    mode = "sandbox"
    mode = ${?PAYPAL_MODE}
    clientId = ""
    clientId = ${?PAYPAL_CLIENT_ID}
    clientSecret = ""
    clientSecret = ${?PAYPAL_CLIENT_SECRET}
}

app {
    env = "development"
    env = ${?APP_ENV}
    jwtSecret = "change-this-secret-in-production"
    jwtSecret = ${?JWT_SECRET}
}
