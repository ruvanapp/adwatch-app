version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: adwatch-postgres
    environment:
      POSTGRES_DB: adwatch
      POSTGRES_USER: adwatch
      POSTGRES_PASSWORD: adwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    container_name: adwatch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adwatch-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/adwatch
      DATABASE_USER: adwatch
      DATABASE_PASSWORD: adwatch
      REDIS_URL: redis://redis:6379
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      APP_ENV: development
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro

volumes:
  postgres_data:
  redis_data:
